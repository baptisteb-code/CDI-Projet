<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>PokéTrok - Accueil</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>

        <!-- Header -->

        <header>
            <a href="index.html"><img class="logo" src="img/logo.png" alt="pokéball"></a>
            <nav>
                <ul>
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="profil.html">Profil</a></li>
                </ul>
                <button>Déconnexion</button>
            </nav>
        </header>
        <div class="modale-overlay">
            <div class="modale">
                <div class="header-modale">
                    <button class="fermer-modale">X</button>
                    <h2>Proposer un échange</h2>
                </div>
                <form action="#" method="post">
                    <div class="content-modale">
                        <div class="select-destinataire">
                            <label for="destinataire">Destinataire</label>
                            <select name="destinataire" id="destinataire">
                                <option value="team-rocket92">Team Rocket92</option>
                                <option value="dracaufeudu78">Dracaufeudu78</option>    
                            </select>
                        </div>    
                        <div class="select-carte">
                            <label for="carte">Carte</label>
                            <select name="carte" id="carte">
                                <option value="pikachu">Pikachu</option>
                                <option value="salameche">Salamèche</option>
                            </select>
                        </div>
                    </div>    
                    <div class="decision-envoi">
                        <button type="button" class="annuler-envoi">Annuler</button>
                        <button type="submit" class="envoyer">Envoyer</button>
                    </div>
                </form>
            </div>
        </div>
        <main>
            <div class="titre">
                <h1> Bienvenue sur PokéTrok !</h1>
                <p>Collectionne des cartes et partage les avec tes amis</p>
            </div>

            <!-- Filtres -->

            <div class="barre-action">
                <div class="type">
                    <button>Tous</button>
                    <button data-type="feu">Feu</button>
                    <button data-type="eau">Eau</button>
                    <button data-type="plante">Plante</button>
                    <button data-type="electrik">Électrik</button>
                </div>
                <button class="booster">Ouvrir un booster</button>
            </div>             

            <!-- Section -->   

            <section data-type="feu">  
                <h2>Type feu</h2>
                <div class="grille">
                    
             
                </div>
            </section>
            <section data-type="eau">  
                <h2>Type eau</h2>
                <div class="grille">
                    

                </div>
            </section>
            <section data-type="plante">  
                <h2>Type plante</h2>
                <div class="grille">
                    

                </div>
            </section>
            <section data-type="electrik">  
                <h2>Type électrik</h2>
                <div class="grille">
                
                    
                </div>
            </section>
            <button class="bouton-echange">⇄</button>
        </main>

        <!-- Footer -->

        <footer>
            <p>PokéTrok — Projet CDI 2026</p>
            <a href="#">Mentions légales</a>
        </footer>

        <script src="js/script.js"></script>
    </body>
</html>
