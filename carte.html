<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>PokéTrok - Carte</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>

        <!-- Header -->

        <header>
            <a href="index.html"><img class="logo" src="img/logo.png" alt="pokeball"></a>
            <nav>
                <ul>
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="profil.html">Profil</a></li>
                </ul>
                <button>Déconnexion</button>
            </nav>
        </header>
        <main class="retour-div">
            <a class="retour" href="index.html">← Retour à la collection</a>
            <section class="fiche">
                <img class="image-detail" src="img/logo.png" alt="salamèche">
                <article class="infos-pokemon" data-type="feu">
                    <h1>Chargement</h1>
                    <span class="badge">...</span>
                    <table>
                        <tr>
                            <th>PV</th>
                            <td class="pv"></td>
                        </tr>
                        <tr>
                            <th>Attaque</th>
                            <td class="attaque"></td>
                        </tr>
                        <tr>
                            <th>Défense</th>
                            <td class="defense"></td>
                        </tr>
                        <tr>
                            <th>Taille</th>
                            <td class="taille"></td>
                        </tr>
                        <tr>
                            <th>Poids</th>
                            <td class="poids"></td>
                        </tr>
                    </table>
                    <div class="bouton-carte">
                        <button class="favori-carte">☆</button>
                        <button class="echange">Proposer un échange</button>
                    </div>
                </article>
            </section>
        </main>

        <!-- Footer -->
         
        <footer>
            <p>PokéTrok — Projet CDI 2026</p>
            <a href="#">Mentions légales</a>
        </footer>

        <script src="js/script.js"></script>
    </body>
</html>
