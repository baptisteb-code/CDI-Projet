<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>PokéTrok - Inscription</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>

        <!-- Header -->

        <header>
            <a href="index.html"><img class="logo" src="img/logo.png" alt="pokeball"></a>
        </header>
        <main>
            <h1 class="inscription">Inscription</h1>
            <form action="#" method="post">
                <label for="pseudo">Pseudo</label>
                <input type="text" id="pseudo" name="pseudo" required>
                <label for="email">Adresse e-mail</label>
                <input type="email" id="email" name="email" required>
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required>
                <button type="submit">Créer mon compte</button>
                <p> Déjà un compte ? <a href="connexion.html">Se connecter</a> </p>
            </form>
        </main>

        <!-- Footer -->
         
        <footer>
            <p>PokéTrok — Projet CDI 2026</p>
            <a href="#">Mentions légales</a>
        </footer>

        <script src="js/script.js"></script>
    </body>
</html>
